<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPERCAT — 230:500:60000:64000:25</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;font-family:'Consolas',monospace;color:#c8c8c8}
canvas{display:block}
#hud{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.78);border:1px solid #2a3a2a;padding:14px 18px;border-radius:3px;font-size:11px;line-height:1.7;z-index:10;pointer-events:none;min-width:240px}
#hud .l{color:#6a8;font-weight:bold}
#hud .v{color:#ada}
</style>
</head>
<body>
<div id="hud">
  <div><span class="l">230:500:60000:64000:25</span></div>
  <div>flex: <span class="v" id="h_f">—</span>°</div>
  <div>stride +<span class="v" id="h_s">—</span>%</div>
  <div>purr: <span class="v" id="h_p">—</span> Hz</div>
  <div>tapetum: <span class="v" id="h_t">—</span></div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let B;
const EMBED = {"vocalization":{"purr_frequency_Hz":25},"skeleton":{"cervical_vertebrae":7,"thoracic_vertebrae":13,"lumbar_vertebrae":7,"sacral_vertebrae":3,"caudal_vertebrae_range":[18,23]}};
async function init() {
  try { B = await fetch('cat_baseline.json').then(r => r.json()); }
  catch { B = EMBED; }
  document.getElementById('h_p').textContent = B.vocalization.purr_frequency_Hz;
  document.getElementById('h_t').textContent = '45%';
  build();
  requestAnimationFrame(animate);
}

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a18);
scene.fog = new THREE.Fog(0x1a1a18, 5, 35);
const cam = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 60);
cam.position.set(1.5, 1.8, 6);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.3;
document.body.appendChild(renderer.domElement);

const ctrl = new OrbitControls(cam, renderer.domElement);
ctrl.target.set(0,0.5,0); ctrl.enableDamping=true; ctrl.dampingFactor=0.08; ctrl.maxPolarAngle=Math.PI*0.7; ctrl.update();

scene.add(new THREE.DirectionalLight(0xffeedd,5).translateX(8).translateY(12).translateZ(-4));
scene.add(new THREE.HemisphereLight(0x8899cc,0x443322,1.2));
const g = new THREE.Mesh(new THREE.PlaneGeometry(30,30), new THREE.MeshStandardMaterial({color:0x2a2a24,roughness:0.9}));
g.rotation.x=-Math.PI/2; g.receiveShadow=true; scene.add(g);

let skeleton, body, fur, eyes, pinnae, claws;

function felineBodyShape(x, y, z) {
  const len = 1.2;
  const t = (z + len/2) / len;
  const chestR = 0.22 * (1 - Math.abs(t-0.3)*0.6);
  const waistR = 0.16 * (1 - Math.abs(t-0.55)*0.3);
  const r = t < 0.45 ? chestR : waistR;
  const height = 0.45 + Math.sin(t*Math.PI)*0.08;
  const dx = Math.abs(x) / (r+0.001);
  const dy = (y - height*0.5) / (height*0.5 + 0.001);
  return Math.max(dx, Math.abs(dy)) - 1;
}

function build() {
  const bmat = new THREE.MeshStandardMaterial({color:0xd4c8b8, roughness:0.5, metalness:0.05});
  const sk = B.skeleton;
  const n = sk.cervical_vertebrae+sk.thoracic_vertebrae+sk.lumbar_vertebrae+sk.sacral_vertebrae;

  skeleton = {group:new THREE.Group(), verts:[], tail:null, jaw:null};
  for (let i = 0; i < n; i++) {
    const h = 0.03 + (i<7?0.01:i<20?0.006:0.004);
    const r = 0.035 - i*0.0004;
    const v = new THREE.Mesh(new THREE.CylinderGeometry(r*0.6,r,h,8), bmat);
    v.position.set(0, 0.12 + i*h*1.3, -0.55 + i*h*0.9);
    v.castShadow=true; skeleton.group.add(v); skeleton.verts.push(v);
  }
  const tf = skeleton.verts[skeleton.verts.length-1].position;

  skeleton.tail = new THREE.Group();
  for (let i=0;i<sk.caudal_vertebrae_range[1];i++) {
    const s = 0.018*(1-i/sk.caudal_vertebrae_range[1]);
    skeleton.tail.add(new THREE.Mesh(new THREE.SphereGeometry(s,6,4),bmat));
    skeleton.tail.children[i].position.set(0,0,-0.04-i*0.04);
  }
  skeleton.tail.position.copy(tf).add(new THREE.Vector3(0,-0.02,-0.05));
  skeleton.group.add(skeleton.tail);

  const skull = new THREE.Mesh(new THREE.SphereGeometry(0.09,16,12),bmat);
  skull.scale.set(1,1.1,0.75); skull.position.set(0,0.55,-0.02); skeleton.group.add(skull);

  skeleton.jaw = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.018,0.05),bmat);
  skeleton.jaw.position.set(0,0.46,0.03); skeleton.group.add(skeleton.jaw);

  for (let s=-1;s<=1;s+=2) {
    const scap = new THREE.Mesh(new THREE.BoxGeometry(0.035,0.16,0.02),bmat);
    scap.position.set(s*0.16,0.44,-0.15); scap.rotation.z=s*0.35; skeleton.group.add(scap);
  }
  for (let s=-1;s<=1;s+=2) {
    const up = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.024,0.2,8),bmat);
    up.position.set(s*0.18,0.28,-0.15); up.rotation.z=s*0.2; skeleton.group.add(up);
    for (let b=0;b<2;b++) {
      const lo = new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.016,0.18,6),bmat);
      lo.position.set(s*(0.19+b*0.025),0.1,-0.15); skeleton.group.add(lo);
    }
    const paw = new THREE.Mesh(new THREE.SphereGeometry(0.022,8,6),bmat);
    paw.position.set(s*0.2,-0.06,-0.15); skeleton.group.add(paw);
  }
  for (let i=0;i<sk.thoracic_vertebrae;i++)
    for (let s=-1;s<=1;s+=2) {
      const rib = new THREE.Mesh(new THREE.TorusGeometry(0.14,0.007,6,8,Math.PI/2+0.35),bmat);
      rib.position.set(s*0.07,0.2+i*0.035,-0.2+i*0.08);
      rib.rotation.set(0,s*Math.PI/2,Math.PI/2); rib.scale.y=0.5+i*0.025; skeleton.group.add(rib);
    }
  scene.add(skeleton.group);

  body = new THREE.Group();
  const bgeo = new THREE.CylinderGeometry(0.22,0.18,1.2,24,8);
  bgeo.scale(1,0.7,1);
  const bodyMesh = new THREE.Mesh(bgeo, new THREE.MeshStandardMaterial({color:0xcc9966,roughness:0.7}));
  bodyMesh.position.y = 0.35;
  bodyMesh.castShadow = true;
  body.add(bodyMesh);

  const headGeo = new THREE.SphereGeometry(0.1,16,12);
  headGeo.scale(1,1.05,0.7);
  const head = new THREE.Mesh(headGeo, new THREE.MeshStandardMaterial({color:0xcc9966,roughness:0.6}));
  head.position.set(0,0.58,-0.04); head.castShadow=true; body.add(head);

  const nose = new THREE.Mesh(new THREE.ConeGeometry(0.025,0.04,8,4), new THREE.MeshStandardMaterial({color:0xd4886a,roughness:0.5}));
  nose.position.set(0,0.55,0.07); nose.rotation.x=Math.PI/2; body.add(nose);

  for (let s=-1;s<=1;s+=2) {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.04,0.12,8,4), new THREE.MeshStandardMaterial({color:0xddaa88,roughness:0.5,side:THREE.DoubleSide}));
    ear.position.set(s*0.06,0.65,0); ear.rotation.z=s*0.3; ear.rotation.x=-0.15; body.add(ear);
  }
  scene.add(body);

  for (let s=-1;s<=1;s+=2) {
    for (let p=0;p<2;p++) {
      const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.045,0.35,12), new THREE.MeshStandardMaterial({color:0xcc9966,roughness:0.7}));
      leg.position.set(s*0.18,0.05,-0.25+p*0.35); leg.castShadow=true; body.add(leg);
    }
  }

  eyes = new THREE.Group();
  for (let s=-1;s<=1;s+=2) {
    const e = new THREE.Mesh(new THREE.SphereGeometry(0.035,24,16), new THREE.MeshStandardMaterial({color:0x111111,roughness:0.1}));
    e.position.set(s*0.04,0.58,0.06); eyes.add(e);
    const ir = new THREE.Mesh(new THREE.SphereGeometry(0.022,16,12), new THREE.MeshStandardMaterial({color:0x44aa22,roughness:0.2,emissive:0x114411,emissiveIntensity:0.4}));
    ir.position.set(s*0.04,0.58,0.065); eyes.add(ir);
    const tp = new THREE.Mesh(new THREE.SphereGeometry(0.03,8,8), new THREE.MeshStandardMaterial({color:0x88ff88,roughness:0,metalness:0.9,emissive:0x226622,emissiveIntensity:0.7,opacity:0.5,transparent:true}));
    tp.position.set(s*0.04,0.58,0.062); eyes.add(tp);
    const sl = new THREE.Mesh(new THREE.BoxGeometry(0.007,0.022,0.004), new THREE.MeshStandardMaterial({color:0x000000,roughness:0}));
    sl.position.set(s*0.04,0.58,0.068); eyes.add(sl);
  }
  scene.add(eyes);

  pinnae = new THREE.Group();
  for (let s=-1;s<=1;s+=2) {
    const pg = new THREE.ConeGeometry(0.05,0.13,8,4); pg.rotateZ(s*0.35);
    const p = new THREE.Mesh(pg, new THREE.MeshStandardMaterial({color:0xddaa88,roughness:0.5,side:THREE.DoubleSide}));
    p.position.set(s*0.07,0.64,0); p.rotation.y=s*0.25; pinnae.add(p);
  }
  scene.add(pinnae);

  claws = [];
  const cg = new THREE.Group();
  for (let p=0;p<4;p++) {
    const s = p<2?-1:1;
    const cl = new THREE.Mesh(new THREE.ConeGeometry(0.008,0.035,6,3), new THREE.MeshStandardMaterial({color:0xeee8dd,roughness:0.2}));
    cl.position.set(s*0.2,-0.07,-0.25+(p%2)*0.35); cl.userData={baseY:cl.position.y}; cg.add(cl); claws.push(cl);
  }
  scene.add(cg);

  fur = new THREE.Group();
  for (let i=0;i<3000;i++) {
    const th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI, r=0.22+Math.random()*0.05;
    const x=Math.cos(th)*Math.sin(ph)*r, y=0.35+Math.cos(ph)*r*0.7, z=Math.sin(th)*Math.sin(ph)*r*0.55;
    if (Math.abs(z)>0.55) continue;
    const len = 0.04+Math.random()*0.06;
    const f = new THREE.Mesh(new THREE.CylinderGeometry(0.002,0.004,len,3), new THREE.MeshStandardMaterial({color:0xcc9966,roughness:0.6}));
    f.position.set(x,y,z); f.rotation.set(Math.random()*0.5,Math.random()*Math.PI*2,Math.random()*0.5);
    fur.add(f);
  }
  scene.add(fur);

  for (let i=0;i<12;i++) {
    const s=i<6?-1:1;
    const c=new THREE.QuadraticBezierCurve3(new THREE.Vector3(s*0.05,0.56,0.07),new THREE.Vector3(s*0.18,0.54+(i%3)*0.02,0.07+(i%2-0.5)*0.03),new THREE.Vector3(s*0.28,0.48,0.05));
    scene.add(new THREE.Mesh(new THREE.TubeGeometry(c,8,0.002,4,false), new THREE.MeshStandardMaterial({color:0xeeeeee,roughness:0.3})));
  }
}

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  if(!B)return;
  const t=clock.getElapsedTime(), dt=Math.min(clock.getDelta(),0.1);
  ctrl.update();
  const breath=Math.sin(t*2.5)*0.5+0.5, arch=breath*40*(Math.PI/180), stride=1+Math.abs(Math.sin(t*3))*0.2;
  document.getElementById('h_f').textContent=Math.round(breath*40);
  document.getElementById('h_s').textContent=Math.round((stride-1)*100);

  skeleton.verts.forEach((v,i)=>{
    v.rotation.z=Math.sin(t*3.5+i/skeleton.verts.length*Math.PI*2)*arch*(1-i/skeleton.verts.length*0.3);
    v.rotation.x=Math.cos(t*3.5+i/skeleton.verts.length*Math.PI)*arch*0.15;
  });
  skeleton.tail.rotation.z=Math.sin(t*2)*0.4; skeleton.tail.rotation.y=Math.cos(t*1.7)*0.3;
  skeleton.jaw.rotation.x=breath*0.06;

  body.children.forEach(c=>{
    if(c===body.children[0]){ c.scale.y=0.7+Math.sin(t*3.5)*0.05; c.position.y=0.35+Math.sin(t*3.5)*0.03; }
  });
  body.position.y = Math.sin(t*0.7)*0.004;

  pinnae.children.forEach((p,i)=>{
    p.rotation.y=(i?-1:1)*(0.25+Math.sin(t*2.3)*0.35);
    p.rotation.z=(i?-1:1)*0.1+Math.cos(t*1.8)*0.15;
  });

  const purr=0.001*(Math.sin(t*0.7)*0.5+0.5);
  skeleton.group.position.x=Math.sin(t*Number(B.vocalization.purr_frequency_Hz)*Math.PI*2)*purr;
  body.position.x=skeleton.group.position.x;

  const glow=0.5+Math.sin(t*1.5)*0.3+Math.sin(t*7.3)*0.15;
  eyes.children.forEach(c=>{if(c.material.emissiveIntensity!==undefined)c.material.emissiveIntensity=glow;});

  const cp=Math.sin(t*0.6);
  claws.forEach(c=>{c.position.y=c.userData.baseY+(cp>0.3?(cp-0.3)*0.012:0);});

  fur.rotation.y+=dt*0.1;
  renderer.render(scene,cam);
}

init();
window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
